<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ecosaeco</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .container { width: 100%; max-width: 560px; }
    h1 { font-size: 26px; font-weight: 500; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
    .cat-btn {
      width: 100%; padding: 12px 14px;
      border-radius: 10px; border: 1px solid #2a2a2a;
      background: #181818; color: #e8e8e8;
      cursor: pointer; font-size: 13px; text-align: left;
      display: block; margin-bottom: 8px;
      transition: background 0.15s;
    }
    .cat-btn:hover { background: #222; }
    .badge {
      float: right; font-size: 11px;
      background: #1a2a3a; color: #6ab0f5;
      padding: 2px 8px; border-radius: 20px;
    }
    .game-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
    .game-title { font-size: 18px; font-weight: 500; }
    .score-num { font-size: 28px; font-weight: 500; text-align: right; }
    .score-label { font-size: 11px; color: #888; text-align: right; }
    .game-desc { font-size: 12px; color: #888; margin-bottom: 1rem; }
    .input-row { display: flex; gap: 8px; margin-bottom: 1rem; }
    input {
      flex: 1; padding: 10px 14px;
      background: #181818; border: 1px solid #2a2a2a;
      border-radius: 10px; color: #e8e8e8; font-size: 14px;
      outline: none;
    }
    input:focus { border-color: #444; }
    input:disabled { opacity: 0.5; }
    button {
      padding: 10px 16px; border-radius: 10px;
      border: 1px solid #2a2a2a; background: #222;
      color: #e8e8e8; cursor: pointer; font-size: 13px;
      white-space: nowrap;
    }
    button:hover { background: #2a2a2a; }
    button:disabled { opacity: 0.5; cursor: default; }
    .back-btn { color: #888; font-size: 12px; }
    .result-box {
      min-height: 56px; background: #181818;
      border-radius: 10px; padding: 12px 16px; margin-bottom: 1rem;
    }
    #res { font-size: 14px; color: #888; }
    #res2 { font-size: 12px; color: #888; margin-top: 4px; display: none; }
    .used-label { font-size: 12px; color: #888; margin-bottom: 6px; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      padding: 3px 10px; border-radius: 20px; font-size: 12px;
    }
    .tag-ok { background: #0f2a1a; color: #4ade80; }
    .hidden { display: none; }
  </style>
</head>
<body>
<div class="container">

  <div id="screen-select">
    <h1>ecosaeco</h1>
    <p class="subtitle">Choose a category and name as many members as you can</p>
    <div id="cat-grid"></div>
  </div>

  <div id="screen-game" class="hidden">
    <div class="game-header">
      <p class="game-title" id="game-title"></p>
      <div>
        <p class="score-num" id="pts">0</p>
        <p class="score-label">points</p>
      </div>
    </div>
    <p class="game-desc" id="game-desc"></p>
    <div class="input-row">
      <input id="resp" placeholder="Your answer..." onkeydown="if(event.key==='Enter')verificar()"/>
      <button onclick="verificar()" id="btn">Check</button>
      <button class="back-btn" onclick="resetGame()">↩ Back</button>
    </div>
    <div class="result-box">
      <p id="res">Start naming...</p>
      <p id="res2"></p>
    </div>
    <div id="usados-box" class="hidden">
      <p class="used-label" id="used-label">Used (0):</p>
      <div class="tags" id="usados"></div>
    </div>
  </div>

</div>

let currentCat=null, usados=new Set(), puntos=0

function norm(str){
  return str.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/^the\s+/,"")
    .replace(/[^a-z0-9\s]/g,"")
    .replace(/\s+/g," ").trim()
}

function buildGrid(){
  const grid=document.getElementById("cat-grid")
  CATEGORIES.forEach(cat=>{
    const btn=document.createElement("button")
    btn.className="cat-btn"
    const badge=cat.badge?`<span class="badge">${cat.badge}</span>`:""
    btn.innerHTML=`${cat.name}${badge}`
    btn.onclick=()=>startGame(cat)
    grid.appendChild(btn)
  })
}

function startGame(cat){
  currentCat=cat; usados=new Set(); puntos=0
  document.getElementById("pts").innerText="0"
  document.getElementById("game-title").innerText=cat.name
  document.getElementById("game-desc").innerText=cat.desc
  document.getElementById("usados").innerHTML=""
  document.getElementById("usados-box").classList.add("hidden")
  document.getElementById("used-label").innerText="Used (0):"
  setRes("Start naming...","#888",null)
  document.getElementById("screen-select").classList.add("hidden")
  document.getElementById("screen-game").classList.remove("hidden")
  document.getElementById("resp").value=""
  document.getElementById("resp").focus()
}

function resetGame(){
  document.getElementById("screen-game").classList.add("hidden")
  document.getElementById("screen-select").classList.remove("hidden")
}

function setRes(main,color,sub){
  const r=document.getElementById("res")
  r.innerText=main; r.style.color=color
  const r2=document.getElementById("res2")
  if(sub){r2.innerText=sub;r2.style.display="block"}
  else{r2.style.display="none"}
}

function verificar(){
  const input=document.getElementById("resp").value.trim()
  if(!input)return
  const n=norm(input)
  if(!n)return
  if(usados.has(n)){setRes("Already used that one!","#d97706",null);return}

  if(currentCat.id==="defunct"){
    const fact=currentCat.facts[n]
    if(fact){accept(input,n,fact)}
    else{setRes("Not recognized — try another name or spelling.","#ef4444",null)}
    return
  }

  if(currentCat.id==="southern"){
    if(currentCat.notValid.has(n)){
      const reason=currentCat.notValidReasons[n]||"Part of this country lies in or above the Northern Hemisphere."
      setRes("Not entirely southern!","#ef4444",reason)
      return
    }
  }

  if(currentCat.list.has(n)){accept(input,n,null);return}
  setRes("Not found. Check spelling, or try the full name.","#ef4444",null)
}

function accept(input,n,reason){
  usados.add(n); puntos++
  document.getElementById("pts").innerText=puntos
  document.getElementById("resp").value=""
  setRes("Valid!","#4ade80",reason||null)
  const tag=document.createElement("span")
  tag.className="tag tag-ok"
  tag.innerText=input
  document.getElementById("usados").appendChild(tag)
  document.getElementById("used-label").innerText="Used ("+puntos+"):"
  document.getElementById("usados-box").classList.remove("hidden")
  document.getElementById("resp").focus()
}

buildGrid()
</script>
