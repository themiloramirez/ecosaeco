<div class="container">

</div>

  const val = T[LANG][key]

// ─── STORAGE ─────────────────────────────────────────────────────────────────
function saveProgress(catId, found, total) {
  const key = `eco_${catId}`
  const data = { found: [...found], total, ts: Date.now() }
  try { localStorage.setItem(key, JSON.stringify(data)) } catch(e) {}
}
function loadProgress(catId) {
  try {
    const raw = localStorage.getItem(`eco_${catId}`)
    if (!raw) return null
    return JSON.parse(raw)
  } catch(e) { return null }
}
function clearProgress(catId) {
  try { localStorage.removeItem(`eco_${catId}`) } catch(e) {}
}

    facts:{"soviet union":"Dissolved in 1991 into 15 independent republics.","ussr":"Dissolved in 1991 into 15 independent republics.","yugoslavia":"Broke apart 1991–1992 into Slovenia, Croatia, Bosnia, Serbia, Montenegro, North Macedonia, and later Kosovo.","czechoslovakia":"Peacefully split in 1993 — the Velvet Divorce.","east germany":"Reunified with West Germany in 1990.","west germany":"Reunified with East Germany in 1990.","ottoman empire":"Collapsed after WWI, giving rise to modern Turkey and many Middle Eastern states.","austro-hungarian empire":"Dissolved after WWI into Austria, Hungary, Czechoslovakia, Yugoslavia and more.","austria-hungary":"Dissolved after WWI.","persian empire":"Conquered by Alexander the Great in 330 BC.","byzantine empire":"Fell in 1453 when Constantinople was taken by the Ottomans.","eastern roman empire":"The Byzantine Empire — fell in 1453.","roman empire":"Fell in 476 AD in the West; survived as Byzantium until 1453.","holy roman empire":"Dissolved in 1806. Voltaire: 'neither holy, nor Roman, nor an empire.'","prussia":"Abolished by the Allied Control Council in 1947.","south vietnam":"Fell to North Vietnam in 1975.","north vietnam":"Unified with South Vietnam in 1975.","south yemen":"Unified with North Yemen in 1990.","confederate states of america":"Defeated in the US Civil War, 1865.","confederacy":"Defeated in the US Civil War, 1865.","ceylon":"Renamed Sri Lanka in 1972.","rhodesia":"Became Zimbabwe in 1980.","gold coast":"Became Ghana in 1957 — the first sub-Saharan country to gain independence.","abyssinia":"Renamed Ethiopia; Italian occupation 1936–1941.","persia":"Renamed Iran in 1935 by Reza Shah Pahlavi.","mesopotamia":"Now modern Iraq. Cradle of writing, law, and the wheel.","gran colombia":"Bolívar's republic dissolved in 1831 into Colombia, Venezuela, and Ecuador.","republic of texas":"Independent 1836–1846, then annexed by the US.","burma":"Renamed Myanmar in 1989.","belgian congo":"Became the DRC in 1960.","biafra":"Attempted secession from Nigeria 1967–1970.","manchuria":"Puppet state Manchukuo dissolved 1945.","manchukuo":"Japanese puppet state — dissolved 1945.","tanganyika":"Merged with Zanzibar in 1964 to form Tanzania.","zanzibar":"Merged with Tanganyika in 1964 to form Tanzania.","nyasaland":"Became Malawi in 1964.","northern rhodesia":"Became Zambia in 1964.","bechuanaland":"Became Botswana in 1966.","basutoland":"Became Lesotho in 1966.","dahomey":"Renamed Benin in 1975.","upper volta":"Renamed Burkina Faso in 1984 — 'Land of Incorruptible People.'","sikkim":"Merged with India in 1975.","sumer":"First known writing system emerged here around 3200 BC.","akkad":"First empire in history — collapsed around 2154 BC.","babylon":"Fell to Cyrus the Great in 539 BC.","assyria":"Fell in 612 BC when Nineveh was sacked.","carthage":"Destroyed by Rome in 146 BC. Carthago delenda est.","phoenicia":"Gave the world the alphabet — absorbed by Alexander in 332 BC.","dutch east indies":"Became Indonesia in 1945.","french indochina":"Dissolved into Vietnam, Laos, and Cambodia in 1954.","tannu tuva":"Absorbed into the USSR in 1944. Feynman was obsessed with visiting it.","republic of china":"Retreated to Taiwan in 1949.","weimar republic":"Ended when Hitler became chancellor in 1933.","nazi germany":"Collapsed May 1945.","third reich":"Collapsed May 1945.","mughal empire":"Formally ended by the British in 1858.","british raj":"Ended with Indian independence in 1947.","republic of venice":"Absorbed by Napoleon in 1797 after 1,000 years.","papal states":"Ended when Rome was annexed by Italy in 1870.","kingdom of hawaii":"Overthrown 1893 — became a US state in 1959.","mali empire":"Mansa Musa was so wealthy his pilgrimage to Mecca crashed Mediterranean gold markets.","mongol empire":"The largest contiguous land empire in history — 24 million km².","german empire":"Ended with WWI defeat in 1918.","lydia":"Possibly the first civilization to use coined money.","bophuthatswana":"Apartheid Bantus   { id:"euphemisms", level:"normal", lang:"en",
    name:"Euphemisms for death in English",
    desc:"Name any English euphemism for dying or death", total:40,
    list:new Set(["pass away","passed away","pass on","passed on","kick the bucket","bite the dust","meet your maker","buy the farm","six feet under","push up daisies","pushing up daisies","go to a better place","breathe your last","give up the ghost","cash in your chips","check out","cross the rainbow bridge","depart","expire","join the choir invisible","kick it","leave this world","lose your life","meet your end","no longer with us","peg out","perish","pop your clogs","rest in peace","rip","shuffle off this mortal coil","sleep with the fishes","snuff it","succumb","take your last breath","the big sleep","turn up your toes","go the way of all flesh","croak","depart this world"]),
    flavors:{"shuffle off this mortal coil":"Shakespeare, Hamlet — 'To die, to sleep / To sleep, perchance to dream...'","kick the bucket":"Possibly from Old French 'buquet' (a balance) — not the container.","buy the farm":"US military slang — when a pilot crashed on a farm, the government paid the damages.","six feet under":"Standard grave depth in England since the Great Plague of 1665.","join the choir invisible":"From George Eliot's poem — one of the most literary euphemisms in English."}},
]

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentCat = null, usados = new Set(), puntos = 0

function norm(str){
  return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/^the\s+/,"").replace(/[^a-z0-9\s]/g,"").replace(/\s+/g," ").trim()
}

// ─── LANGUAGE ────────────────────────────────────────────────────────────────
function setLang(lang){
  LANG = lang
  document.getElementById("screen-lang").classList.add("hidden")
  buildGrid()
  document.getElementById("screen-select").classList.remove("hidden")
}
function goLang(){
  document.getElementById("screen-select").classList.add("hidden")
  document.getElementById("screen-lang").classList.remove("hidden")
}

// ─── BUILD GRID ───────────────────────────────────────────────────────────────
function buildGrid(){
  const grid = document.getElementById("cat-grid")
  grid.innerHTML = ""
  document.getElementById("select-subtitle").innerText = t("subtitle")
  document.getElementById("lang-toggle").innerText = t("langToggle")

  const beginners = CATEGORIES.filter(c => c.level === "beginner" && c.lang === LANG)
  const normals = CATEGORIES.filter(c => c.level === "normal" && (c.lang === "en" || c.lang === LANG))

  const h1 = document.createElement("p"); h1.className = "level-header"; h1.innerText = t("beginner"); grid.appendChild(h1)
  beginners.forEach(cat => grid.appendChild(makeBtn(cat)))
  const h2 = document.createElement("p"); h2.className = "level-header"; h2.innerText = t("normal"); grid.appendChild(h2)
  normals.forEach(cat => grid.appendChild(makeBtn(cat)))
}

function makeBtn(cat){
  const btn = document.createElement("button")
  btn.className = "cat-btn" + (cat.level === "beginner" ? " beginner" : "")
  btn.id = "btn-" + cat.id

  const prog = loadProgress(cat.id)
  const pct = prog && cat.total ? Math.round((prog.found.length / cat.total) * 100) : 0
  const countStr = cat.total ? `<span class="cat-count">${cat.total}</span>` : `<span class="cat-count">${t("open")}</span>`
  const starterBadge = cat.level === "beginner" ? `<span class="badge-easy">${t("beginner")}</span>` : ""

  let progressHtml = ""
  if(pct > 0){
    progressHtml = `<div class="cat-progress"><div class="cat-progress-fill" style="width:${pct}%"></div></div><div class="cat-pct">${pct}%</div>`
  }

  btn.innerHTML = `${cat.name}<span class="cat-meta">${countStr}${starterBadge}</span>${progressHtml}`
  btn.onclick = () => startGame(cat)
  return btn
}

// ─── GAME ─────────────────────────────────────────────────────────────────────
function setRes(main, color, flavor, wiki){
  document.getElementById("res").innerText = main
  document.getElementById("res").style.color = color
  const tip_el = document.getElementById("res-tip")
  tip_el.style.display = "none"
  const fl = document.getElementById("res-flavor")
  if(flavor){ fl.innerText = flavor; fl.style.display = "block" } else { fl.style.display = "none" }
  const wk = document.getElementById("res-wiki")
  if(wiki){ wk.innerHTML = `<a href="${wiki}" target="_blank" rel="noopener">→ Wikipedia</a>`; wk.style.display = "block" } else { wk.style.display = "none" }
}

function showTip(tip){
  const ft = document.getElementById("res-tip")
  if(tip){ ft.innerText = "💡 " + tip; ft.style.display = "block" }
}

function startGame(cat){
  currentCat = cat
  const prog = loadProgress(cat.id)
  usados = prog ? new Set(prog.found) : new Set()
  puntos = usados.size

  document.getElementById("pts").innerText = puntos
  document.getElementById("pts-label").innerText = t("points")
  document.getElementById("game-title").innerText = cat.name
  document.getElementById("game-desc").innerText = cat.desc
  document.getElementById("usados").innerHTML = ""
  document.getElementById("usados-box").classList.add("hidden")
  document.getElementById("used-label").innerText = t("usedLabel") + " (0):"

  // Restore used tags
  if(usados.size > 0){
    usados.forEach(n => addTag(n, false))
    document.getElementById("used-label").innerText = t("usedLabel") + " (" + puntos + "):"
    document.getElementById("usados-box").classList.remove("hidden")
  }

  updateProgress()
  setRes(t("startNaming"), "#888", null, null)
  document.getElementById("screen-select").classList.add("hidden")
  document.getElementById("screen-game").classList.remove("hidden")
  document.getElementById("resp").value = ""
  document.getElementById("resp").focus()
}

function resetGame(){
  document.getElementById("screen-game").classList.add("hidden")
  document.getElementById("screen-win").classList.add("hidden")
  buildGrid()
  document.getElementById("screen-select").classList.remove("hidden")
}

function updateProgress(){
  const pl = document.getElementById("progress-line")
  const bar = document.getElementById("progress-bar")
  if(currentCat.total){
    const left = currentCat.total - puntos
    pl.innerHTML = `<span>${puntos}</span> / ${currentCat.total} — ${left} ${t("toGo")}`
    bar.style.width = Math.round((puntos / currentCat.total) * 100) + "%"
  } else {
    pl.innerHTML = `<span>${puntos}</span> ${t("foundSoFar")}`
    bar.style.width = "0%"
  }
}

function checkSavePoint(prev, curr, total){
  if(!total) return
  const checkpoints = [0.25, 0.5, 0.75, 1.0]
  for(const cp of checkpoints){
    const threshold = Math.floor(total * cp)
    if(prev < threshold && curr >= threshold){
      if(cp < 1.0) showToast(t("savePoint") + " " + Math.round(cp*100) + "%")
      break
    }
  }
}

function showToast(msg){
  const toast = document.getElementById("toast")
  toast.innerText = msg
  toast.classList.add("show")
  setTimeout(() => toast.classList.remove("show"), 2500)
}

// ─── VERIFY ───────────────────────────────────────────────────────────────────
function verificar(){
  const input = document.getElementById("resp").value.trim()
  if(!input) return
  const n = norm(input)
  if(!n) return
  if(usados.has(n)){ setRes(t("alreadyUsed"), "#d97706", null, null); return }

  if(currentCat.id === "french" && currentCat.easter && currentCat.easter.has(n)){
    const fl = currentCat.easterFlavors && currentCat.easterFlavors[n]
    setRes(t("easterEgg"), "#f59e0b", fl, null)
    addTag(input, true); return
  }

  if(currentCat.id === "defunct"){
    const fact = currentCat.facts[n]
    if(fact){ accept(input, n, fact, "https://en.wikipedia.org/wiki/" + toWikiTitle(n)) }
    else { setRes(t("notRecognized"), "#ef4444", null, null) }
    return
  }

  if(currentCat.id === "southern" && currentCat.notValid && currentCat.notValid.has(n)){
    const r = currentCat.notValidReasons && currentCat.notValidReasons[n]
    setRes(t("notSouthern") + " " + (r||""), "#ef4444", null, null)
    return
  }

  if(currentCat.list && currentCat.list.has(n)){
    const tip = currentCat.tips && currentCat.tips[n]
    const flavor = currentCat.flavors && currentCat.flavors[n]
    const wiki = ["capitals","oscars","landlocked","defunct"].includes(currentCat.id)
      ? "https://en.wikipedia.org/wiki/" + toWikiTitle(n) : null
    accept(input, n, flavor || tip, wiki)
    return
  }

  setRes(t("notFound"), "#ef4444", null, null)
}

function accept(input, n, flavor, wiki){
  const prev = puntos
  usados.add(n); puntos++
  document.getElementById("pts").innerText = puntos
  document.getElementById("resp").value = ""
  setRes(t("valid"), "#4ade80", flavor, wiki)
  updateProgress()
  addTag(input, false)
  document.getElementById("used-label").innerText = t("usedLabel") + " (" + puntos + "):"
  document.getElementById("usados-box").classList.remove("hidden")
  document.getElementById("resp").focus()

  // Save progress
  saveProgress(currentCat.id, usados, currentCat.total)
  checkSavePoint(prev, puntos, currentCat.total)

  // Victory?
  if(currentCat.total && puntos >= currentCat.total){
    setTimeout(() => showVictory(), 600)
  }
}

function showVictory(){
  document.getElementById("screen-game").classList.add("hidden")
  document.getElementById("win-title").innerText = t("winTitle", currentCat.name)
  document.getElementById("win-sub").innerText = t("winSub", currentCat.total)
  document.getElementById("win-another").innerText = t("winAnother")
  document.getElementById("win-share").innerText = t("winShare")
  document.getElementById("screen-win").classList.remove("hidden")
  clearProgress(currentCat.id)
}

function shareResult(){
  const text = t("shareText", currentCat.name, puntos, currentCat.total || "?")
  if(navigator.share){ navigator.share({ text }) }
  else { navigator.clipboard.writeText(text).then(() => showToast("Copied!")) }
}

function addTag(nombre, isEaster){
  const tag = document.createElement("span")
  tag.className = "tag" + (isEaster ? " tag-easter" : "")
  tag.innerText = nombre
  document.getElementById("usados").appendChild(tag)
}

function toWikiTitle(n){
  return n.split(" ").map(w => w.charAt(0).toUpperCase() + w.slice(1)).join("_")
}
</script>
