with US involvement; Hawaii became a state in 1959.","zulu kingdom":"Defeated by the British in the Anglo-Zulu War of 1879.","mali empire":"One of the great medieval African empires; Mansa Musa was so wealthy his pilgrimage to Mecca crashed gold markets across the Mediterranean.","songhai empire":"Fell to a Moroccan invasion armed with gunpowder in 1591.","mongol empire":"The largest contiguous land empire in history; at its peak covered 24 million km².","safavid empire":"Persian Shia empire; collapsed in 1736.","umayyad caliphate":"First great Islamic dynasty; at its peak stretched from Spain to Central Asia.","abbasid caliphate":"Islamic golden age; ended when Mongols sacked Baghdad in 1258.","carolingian empire":"Charlemagne's empire; divided in 843 by the Treaty of Verdun into what became France, Germany, and Italy.","frankish empire":"Charlemagne's empire; divided by the Treaty of Verdun in 843.","german empire":"The Kaiserreich; ended with WWI defeat and abdication of Wilhelm II in 1918.","kingdom of serbs croats and slovenes":"Renamed Yugoslavia in 1929 by King Alexander I.","federation of rhodesia and nyasaland":"The Central African Federation; dissolved in 1963.","media":"Ancient Iranian empire; conquered by Cyrus the Great in 550 BC.","lydia":"Ancient kingdom in Anatolia; possibly the first civilization to use coined money."}

const CATEGORIES = [
  { id:"capitals", name:"World capitals", badge:"", desc:"Name any capital city in the world — some countries have more than one!", total: CAPITALS_LIST.size },
  { id:"southern", name:"Countries entirely in the Southern Hemisphere", badge:"tricky", desc:"Every part of the country must lie south of the equator. No partial credit!", total: SOUTHERN_LIST.size },
  { id:"oscars", name:"Best Picture Oscar winners", badge:"", desc:"Name any film that won the Academy Award for Best Picture — full title required", total: OSCARS_LIST.size },
  { id:"primes", name:"Prime numbers up to 100", badge:"tautological", desc:"Name any prime number between 2 and 97", total: PRIMES_LIST.size },
  { id:"defunct", name:"Countries that no longer exist", badge:"open-ended", desc:"Name a country that was once sovereign but is now gone", total: null },
  { id:"french", name:"French expressions used in English", badge:"nouveau", desc:"Name a French expression used in English — no accents needed", total: FRENCH.list.size },
]

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentCat = null, usados = new Set(), puntos = 0

// ─── NORMALIZE ───────────────────────────────────────────────────────────────
function norm(str){
  return str.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/^the\s+/,"")
    .replace(/[^a-z0-9\s]/g,"")
    .replace(/\s+/g," ").trim()
}

// ─── BUILD GRID ───────────────────────────────────────────────────────────────
function buildGrid(){
  const grid = document.getElementById("cat-grid")
  CATEGORIES.forEach(cat => {
    const btn = document.createElement("button")
    btn.className = "cat-btn"
    const badge = cat.badge ? `<span class="badge">${cat.badge}</span>` : ""
    const count = cat.total ? `<span class="cat-count">${cat.total} answers</span>` : `<span class="cat-count">open</span>`
    btn.innerHTML = `${cat.name}<span class="cat-meta">${count}${badge}</span>`
    btn.onclick = () => startGame(cat)
    grid.appendChild(btn)
  })
}

function startGame(cat){
  currentCat = cat; usados = new Set(); puntos = 0
  document.getElementById("pts").innerText = "0"
  document.getElementById("game-title").innerText = cat.name
  document.getElementById("game-desc").innerText = cat.desc
  document.getElementById("usados").innerHTML = ""
  document.getElementById("usados-box").classList.add("hidden")
  document.getElementById("used-label").innerText = "Used (0):"
  updateProgress()
  setRes("Start naming...", "#888", null, null, null)
  document.getElementById("screen-select").classList.add("hidden")
  document.getElementById("screen-game").classList.remove("hidden")
  document.getElementById("resp").value = ""
  document.getElementById("resp").focus()
}

function resetGame(){
  document.getElementById("screen-game").classList.add("hidden")
  document.getElementById("screen-select").classList.remove("hidden")
}

function updateProgress(){
  const pl = document.getElementById("progress-line")
  if(currentCat.total){
    const left = currentCat.total - puntos
    pl.innerHTML = `<span>${puntos}</span> / ${currentCat.total} — ${left} to go`
  } else {
    pl.innerHTML = `<span>${puntos}</span> found so far`
  }
}

function setRes(main, color, tip, flavor, wiki){
  document.getElementById("res").innerText = main
  document.getElementById("res").style.color = color
  const tip_el = document.getElementById("res-tip")
  if(tip){ tip_el.innerText = "💡 " + tip; tip_el.style.display = "block" } else { tip_el.style.display = "none" }
  const fl_el = document.getElementById("res-flavor")
  if(flavor){ fl_el.innerText = flavor; fl_el.style.display = "block" } else { fl_el.style.display = "none" }
  document.getElementById("res-sub").style.display = "none"
  const wiki_el = document.getElementById("res-wiki")
  if(wiki){ wiki_el.innerHTML = `<a href="${wiki}" target="_blank" rel="noopener">→ Read more on Wikipedia</a>`; wiki_el.style.display = "block" } else { wiki_el.style.display = "none" }
}

// ─── VERIFY ───────────────────────────────────────────────────────────────────
function verificar(){
  const input = document.getElementById("resp").value.trim()
  if(!input) return
  const n = norm(input)
  if(!n) return
  if(usados.has(n)){ setRes("Already used that one!", "#d97706", null, null, null); return }

  if(currentCat.id === "french"){
    if(FRENCH.easter.has(n)){
      setRes("🥚 Easter egg! Valid — but doesn't count toward your score.", "#f59e0b", null, FRENCH.easterFlavors[n] || null, null)
      addTag(input, true)
      return
    }
    if(FRENCH.list.has(n)){
      accept(input, n, null, FRENCH.flavors[n] || null, null)
    } else {
      setRes("Not on the list — or try without accents.", "#ef4444", null, null, null)
    }
    return
  }

  if(currentCat.id === "defunct"){
    const fact = DEFUNCT_FACTS[n]
    if(fact){ accept(input, n, null, fact, "https://en.wikipedia.org/wiki/" + n.split(" ").map(w=>w[0].toUpperCase()+w.slice(1)).join("_")) }
    else { setRes("Not recognized — try another name or spelling.", "#ef4444", null, null, null) }
    return
  }

  if(currentCat.id === "southern"){
    if(SOUTHERN_NO.has(n)){
      setRes("Not entirely southern!", "#ef4444", SOUTHERN_REASONS[n] || "Part of this country lies in or above the Northern Hemisphere.", null, null)
      return
    }
    if(SOUTHERN_LIST.has(n)){ accept(input, n, null, SOUTHERN_FLAVORS[n] || null, null); return }
    setRes("Not found. Check spelling.", "#ef4444", null, null, null)
    return
  }

  if(currentCat.id === "capitals"){
    if(CAPITALS_LIST.has(n)){ accept(input, n, CAPITALS_TIPS[n] || null, null, "https://en.wikipedia.org/wiki/" + n.split(" ").map(w=>w[0].toUpperCase()+w.slice(1)).join("_")); return }
    setRes("Not found. Check spelling.", "#ef4444", null, null, null)
    return
  }

  if(currentCat.id === "oscars"){
    if(OSCARS_LIST.has(n)){ accept(input, n, null, OSCARS_FLAVORS[n] || null, "https://en.wikipedia.org/wiki/" + n.split(" ").map(w=>w[0].toUpperCase()+w.slice(1)).join("_") + "_(film)"); return }
    setRes("Not found. Check spelling or try the full title.", "#ef4444", null, null, null)
    return
  }

  if(currentCat.id === "primes"){
    if(PRIMES_LIST.has(n)){ accept(input, n, null, PRIMES_FLAVORS[n] || null, null); return }
    setRes("Not a prime — or out of range (2–97).", "#ef4444", null, null, null)
    return
  }
}

function accept(input, n, tip, flavor, wiki){
  usados.add(n); puntos++
  document.getElementById("pts").innerText = puntos
  document.getElementById("resp").value = ""
  setRes("Valid!", "#4ade80", tip, flavor, wiki)
  updateProgress()
  addTag(input, false)
  document.getElementById("used-label").innerText = "Used (" + puntos + "):"
  document.getElementById("usados-box").classList.remove("hidden")
  document.getElementById("resp").focus()
}

function addTag(nombre, isEaster){
  const tag = document.createElement("span")
  tag.className = "tag" + (isEaster ? " tag-easter" : "")
  tag.innerText = nombre
  document.getElementById("usados").appendChild(tag)
}

buildGrid()
</script>
