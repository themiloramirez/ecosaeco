// ─── STATE ────────────────────────────────────────────────────────────────────
let currentCat = null, usados = new Set(), puntos = 0

function norm(str){
  return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/^the\s+/,"").replace(/[^a-z0-9\s]/g,"").replace(/\s+/g," ").trim()
}

function buildGrid(){
  const grid = document.getElementById("cat-grid")
  const beginners = CATEGORIES.filter(c => c.level === "beginner")
  const normals = CATEGORIES.filter(c => c.level === "normal")

  const h1 = document.createElement("p")
  h1.className = "level-header"; h1.innerText = "Beginner"
  grid.appendChild(h1)
  beginners.forEach(cat => grid.appendChild(makeBtn(cat)))

  const h2 = document.createElement("p")
  h2.className = "level-header"; h2.innerText = "Normal"
  grid.appendChild(h2)
  normals.forEach(cat => grid.appendChild(makeBtn(cat)))
}

function makeBtn(cat){
  const btn = document.createElement("button")
  btn.className = "cat-btn" + (cat.level === "beginner" ? " beginner" : "")
  const badge = cat.badge ? `<span class="badge">${cat.badge}</span>` : ""
  const easyBadge = cat.level === "beginner" ? `<span class="badge badge-easy">starter</span>` : ""
  const count = cat.total ? `<span class="cat-count">${cat.total}</span>` : `<span class="cat-count">open</span>`
  btn.innerHTML = `${cat.name}<span class="cat-meta">${count}${easyBadge}${badge}</span>`
  btn.onclick = () => startGame(cat)
  return btn
}

function startGame(cat){
  currentCat = cat; usados = new Set(); puntos = 0
  document.getElementById("pts").innerText = "0"
  document.getElementById("game-title").innerText = cat.name
  document.getElementById("game-desc").innerText = cat.desc
  document.getElementById("usados").innerHTML = ""
  document.getElementById("usados-box").classList.add("hidden")
  document.getElementById("used-label").innerText = "Used (0):"
  updateProgress()
  setRes("Start naming...", "#888", null, null)
  document.getElementById("screen-select").classList.add("hidden")
  document.getElementById("screen-game").classList.remove("hidden")
  document.getElementById("resp").value = ""
  document.getElementById("resp").focus()
}

function resetGame(){
  document.getElementById("screen-game").classList.add("hidden")
  document.getElementById("screen-select").classList.remove("hidden")
}

function updateProgress(){
  const pl = document.getElementById("progress-line")
  if(currentCat.total){
    pl.innerHTML = `<span>${puntos}</span> / ${currentCat.total} — ${currentCat.total - puntos} to go`
  } else {
    pl.innerHTML = `<span>${puntos}</span> found so far`
  }
}

function setRes(main, color, flavor, wiki){
  document.getElementById("res").innerText = main
  document.getElementById("res").style.color = color
  const ft = document.getElementById("res-tip")
  ft.style.display = "none"
  const fl = document.getElementById("res-flavor")
  if(flavor){ fl.innerText = flavor; fl.style.display = "block" } else { fl.style.display = "none" }
  const wk = document.getElementById("res-wiki")
  if(wiki){ wk.innerHTML = `<a href="${wiki}" target="_blank" rel="noopener">→ Wikipedia</a>`; wk.style.display = "block" } else { wk.style.display = "none" }
}

function showTip(tip){
  const ft = document.getElementById("res-tip")
  if(tip){ ft.innerText = "💡 " + tip; ft.style.display = "block" }
}

function verificar(){
  const input = document.getElementById("resp").value.trim()
  if(!input) return
  const n = norm(input)
  if(!n) return
  if(usados.has(n)){ setRes("Already used that one!", "#d97706", null, null); return }

  // French easter eggs
  if(currentCat.id === "french" && currentCat.easter && currentCat.easter.has(n)){
    setRes("🥚 Easter egg! Valid — but doesn't count toward your score.", "#f59e0b", null, null)
    addTag(input, true); return
  }

  // Defunct countries
  if(currentCat.id === "defunct"){
    const fact = currentCat.facts[n]
    if(fact){ accept(input, n, fact, "https://en.wikipedia.org/wiki/" + toWikiTitle(n)) }
    else { setRes("Not recognized — try another name or spelling.", "#ef4444", null, null) }
    return
  }

  // Southern hemisphere no-list
  if(currentCat.id === "southern" && currentCat.notValid && currentCat.notValid.has(n)){
    const r = currentCat.notValidReasons && currentCat.notValidReasons[n]
    setRes("Not entirely southern! " + (r||"Part of this country lies above the equator."), "#ef4444", null, null)
    return
  }

  if(currentCat.list.has(n)){
    const tip = currentCat.tips && currentCat.tips[n]
    const flavor = currentCat.flavors && currentCat.flavors[n]
    const wiki = (currentCat.id === "capitals" || currentCat.id === "oscars" || currentCat.id === "landlocked")
      ? "https://en.wikipedia.org/wiki/" + toWikiTitle(n) : null
    accept(input, n, flavor, wiki)
    if(tip) showTip(tip)
  } else {
    setRes("Not found. Check spelling or try the full name.", "#ef4444", null, null)
  }
}

function accept(input, n, flavor, wiki){
  usados.add(n); puntos++
  document.getElementById("pts").innerText = puntos
  document.getElementById("resp").value = ""
  setRes("Valid!", "#4ade80", flavor, wiki)
  updateProgress()
  addTag(input, false)
  document.getElementById("used-label").innerText = "Used (" + puntos + "):"
  document.getElementById("usados-box").classList.remove("hidden")
  document.getElementById("resp").focus()
}

function addTag(nombre, isEaster){
  const tag = document.createElement("span")
  tag.className = "tag" + (isEaster ? " tag-easter" : "")
  tag.innerText = nombre
  document.getElementById("usados").appendChild(tag)
}

function toWikiTitle(n){
  return n.split(" ").map(w => w.charAt(0).toUpperCase() + w.slice(1)).join("_")
}

buildGrid()
</script>
