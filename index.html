  { id:"defunct",level:"normal",lang:"en",name:"Countries that no longer exist",desc:"Name a country that was once sovereign but is now gone",total:null,
    facts:{"soviet union":"Dissolved in 1991 into 15 independent republics.","ussr":"Dissolved in 1991 into 15 independent republics.","yugoslavia":"Broke apart 1991–1992 into Slovenia, Croatia, Bosnia, Serbia, Montenegro, North Macedonia, and later Kosovo.","czechoslovakia":"Peacefully split in 1993 — the Velvet Divorce.","east germany":"Reunified with West Germany in 1990.","west germany":"Reunified with East Germany in 1990.","ottoman empire":"Collapsed after WWI, giving rise to modern Turkey and many Middle Eastern states.","austro-hungarian empire":"Dissolved after WWI into Austria, Hungary, Czechoslovakia, Yugoslavia and more.","austria-hungary":"Dissolved after WWI.","persian empire":"Conquered by Alexander the Great in 330 BC.","byzantine empire":"Fell in 1453 when Constantinople was taken by the Ottomans.","eastern roman empire":"The Byzantine Empire — fell in 1453.","roman empire":"Fell in 476 AD in the West; survived as Byzantium until 1453.","holy roman empire":"Dissolved in 1806. Voltaire: 'neither holy, nor Roman, nor an empire.'","prussia":"Abolished by the Allied Control Council in 1947.","south vietnam":"Fell to North Vietnam in 1975.","north vietnam":"Unified with South Vietnam in 1975.","south yemen":"Unified with North Yemen in 1990.","confederate states of america":"Defeated in the US Civil War, 1865.","confederacy":"Defeated in the US Civil War, 1865.","ceylon":"Renamed Sri Lanka in 1972.","rhodesia":"Became Zimbabwe in 1980.","gold coast":"Became Ghana in 1957 — the first sub-Saharan country to gain independence.","abyssinia":"Renamed Ethiopia; Italian occupation 1936–1941.","persia":"Renamed Iran in 1935 by Reza Shah Pahlavi.","mesopotamia":"Now modern Iraq. Cradle of writing, law, and the wheel.","gran colombia":"Bolívar's republic dissolved in 1831 into Colombia, Venezuela, and Ecuador.","republic of texas":"Independent 1836–1846, then annexed by the US.","burma":"Renamed Myanmar in 1989.","belgian congo":"Became the DRC in 1960.","biafra":"Attempted secession from Nigeria 1967–1970.","manchuria":"Puppet state Manchukuo dissolved 1945.","manchukuo":"Japanese puppet state — dissolved 1945.","tanganyika":"Merged with Zanzibar in 1964 to form Tanzania.","zanzibar":"Merged with Tanganyika in 1964 to form Tanzania.","nyasaland":"Became Malawi in 1964.","northern rhodesia":"Became Zambia in 1964.","bechuanaland":"Became Botswana in 1966.","basutoland":"Became Lesotho in 1966.","dahomey":"Renamed Benin in 1975.","upper volta":"Renamed Burkina Faso in 1984 — 'Land of Incorruptible People.'","sikkim":"Merged with India in 1975.","sumer":"First known writing system emerged here around 3200 BC.","akkad":"First empire in history — collapsed around 2154 BC.","babylon":"Fell to Cyrus the Great in 539 BC.","assyria":"Fell in 612 BC when Nineveh was sacked.","carthage":"Destroyed by Rome in 146 BC. Carthago delenda est.","phoenicia":"Gave the world the alphabet — absorbed by Alexander in 332 BC.","dutch east indies":"Became Indonesia in 1945.","french indochina":"Dissolved into Vietnam, Laos, and Cambodia in 1954.","tannu tuva":"Absorbed into the USSR in 1944. Feynman was obsessed with visiting it.","republic of china":"Retreated to Taiwan in 1949.","weimar republic":"Ended when Hitler became chancellor in 1933.","nazi germany":"Collapsed May 1945.","third reich":"Collapsed May 1945.","mughal empire":"Formally ended by the British in 1858.","british raj":"Ended with Indian independence in 1947.","republic of venice":"Absorbed by Napoleon in 1797 after 1,000 years.","papal states":"Ended when Rome was annexed by Italy in 1870.","kingdom of hawaii":"Overthrown 1893 — became a US state in 1959.","mali empire":"Mansa Musa was so wealthy his pilgrimage to Mecca crashed Mediterranean gold markets.","mongol empire":"The largest contiguous land empire in history — 24 million km².","german empire":"Ended with WWI defeat in 1918.","lydia":"Possibly the first civilization to use coined money.","bophuthatswana":"Apartheid Bantus     flavors:{"nemean lion":"Its skin was impervious to weapons — Heracles strangled it.","lernean hydra":"Cut off one head and two grew back. Heracles cauterized each stump.","augean stables":"3,000 cattle, 30 years of dung, cleaned in one day by rerouting two rivers.","cerberus":"The final labour — retrieving the three-headed guardian of the Underworld."}},
  { id:"columns",level:"normal",lang:"en",name:"Classical Greek architectural orders",desc:"Name the 3 Greek orders of architecture",total:3,
    list:new Set(["doric","ionic","corinthian"]),
    flavors:{"doric":"The oldest and simplest. No base, plain capital. The Parthenon is Doric.","ionic":"Recognizable by its scroll-shaped volutes.","corinthian":"The most ornate — decorated with acanthus leaves. Favored by the Romans."}},
]

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentCat = null, usados = new Set(), puntos = 0

// ─── NORMALIZE ───────────────────────────────────────────────────────────────
function norm(str){
  return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/^the\s+/,"").replace(/^(el|la|los|las)\s+/,"")
    .replace(/[^a-z0-9\s]/g,"").replace(/\s+/g," ").trim()
}

// ─── LANGUAGE ────────────────────────────────────────────────────────────────
function setLang(lang){
  LANG = lang
  document.getElementById("screen-lang").classList.add("hidden")
  buildGrid()
  document.getElementById("screen-select").classList.remove("hidden")
}
function goLang(){
  document.getElementById("screen-select").classList.add("hidden")
  document.getElementById("screen-lang").classList.remove("hidden")
}

// ─── BUILD GRID ───────────────────────────────────────────────────────────────
function buildGrid(){
  const grid = document.getElementById("cat-grid")
  grid.innerHTML = ""
  document.getElementById("select-subtitle").innerText = t("subtitle")
  document.getElementById("lang-toggle").innerText = t("langToggle")
  const beginners = CATEGORIES.filter(c => c.level === "beginner" && c.lang === LANG)
  const normals = CATEGORIES.filter(c => c.level === "normal" && c.lang === "en")
  const h1 = document.createElement("p"); h1.className = "level-header"; h1.innerText = t("beginner"); grid.appendChild(h1)
  beginners.forEach(cat => grid.appendChild(makeBtn(cat)))
  const h2 = document.createElement("p"); h2.className = "level-header"; h2.innerText = t("normal"); grid.appendChild(h2)
  normals.forEach(cat => grid.appendChild(makeBtn(cat)))
}

function makeBtn(cat){
  const btn = document.createElement("button")
  const prog = loadProgress(cat.id)
  const found = prog ? prog.found.length : 0
  const pct = prog && cat.total ? Math.round((found / cat.total) * 100) : 0
  const completed = cat.total && found >= cat.total
  btn.className = "cat-btn" + (cat.level === "beginner" ? " beginner" : "") + (completed ? " completed" : "")
  btn.id = "btn-" + cat.id
  const countStr = cat.total ? `<span class="cat-count">${cat.total}</span>` : `<span class="cat-count">${t("open")}</span>`
  const starterBadge = cat.level === "beginner" ? `<span class="badge-easy">${t("beginner")}</span>` : ""
  const checkmark = completed ? ` ✓` : ""
  let progressHtml = ""
  if(completed){
    progressHtml = `<div class="cat-progress"><div class="cat-progress-fill" style="width:100%"></div></div><div class="cat-pct">${t("completed")}</div>`
  } else if(pct > 0){
    progressHtml = `<div class="cat-progress"><div class="cat-progress-fill" style="width:${pct}%"></div></div><div class="cat-pct">${pct}%</div>`
  }
  btn.innerHTML = `${cat.name}${checkmark}<span class="cat-meta">${countStr}${starterBadge}</span>${progressHtml}`
  btn.onclick = () => startGame(cat)
  return btn
}

// ─── GAME ─────────────────────────────────────────────────────────────────────
function startGame(cat){
  currentCat = cat
  const prog = loadProgress(cat.id)
  usados = prog ? new Set(prog.found) : new Set()
  puntos = usados.size
  document.getElementById("pts").innerText = puntos
  document.getElementById("pts-label").innerText = t("points")
  document.getElementById("game-title").innerText = cat.name
  document.getElementById("game-desc").innerText = cat.desc
  document.getElementById("usados").innerHTML = ""
  document.getElementById("usados-box").classList.add("hidden")
  document.getElementById("used-label").innerText = t("usedLabel") + " (0):"
  if(usados.size > 0){
    usados.forEach(n => addTag(n, false))
    document.getElementById("used-label").innerText = t("usedLabel") + " (" + puntos + "):"
    document.getElementById("usados-box").classList.remove("hidden")
  }
  updateProgress()
  setRes(t("startNaming"), "#888", null, null)
  document.getElementById("screen-select").classList.add("hidden")
  document.getElementById("screen-game").classList.remove("hidden")
  document.getElementById("resp").value = ""
  document.getElementById("resp").focus()
}

function resetGame(){
  document.getElementById("screen-game").classList.add("hidden")
  document.getElementById("screen-win").classList.add("hidden")
  buildGrid()
  document.getElementById("screen-select").classList.remove("hidden")
}

function updateProgress(){
  const pl = document.getElementById("progress-line")
  const bar = document.getElementById("progress-bar")
  if(currentCat.total){
    pl.innerHTML = `<span>${puntos}</span> / ${currentCat.total} — ${currentCat.total - puntos} ${t("toGo")}`
    bar.style.width = Math.round((puntos / currentCat.total) * 100) + "%"
  } else {
    pl.innerHTML = `<span>${puntos}</span> ${t("foundSoFar")}`
    bar.style.width = "0%"
  }
}

function checkSavePoint(prev, curr, total){
  if(!total) return
  for(const cp of [0.25,0.5,0.75,1.0]){
    const threshold = Math.floor(total * cp)
    if(prev < threshold && curr >= threshold){
      if(cp < 1.0) showToast(t("savePoint") + " " + Math.round(cp*100) + "%")
      break
    }
  }
}

function showToast(msg){
  const toast = document.getElementById("toast")
  toast.innerText = msg; toast.classList.add("show")
  setTimeout(() => toast.classList.remove("show"), 2500)
}

function setRes(main, color, flavor, wiki){
  document.getElementById("res").innerText = main
  document.getElementById("res").style.color = color
  document.getElementById("res-tip").style.display = "none"
  const fl = document.getElementById("res-flavor")
  if(flavor){ fl.innerText = flavor; fl.style.display = "block" } else { fl.style.display = "none" }
  const wk = document.getElementById("res-wiki")
  if(wiki){ wk.innerHTML = `<a href="${wiki}" target="_blank" rel="noopener">→ Wikipedia</a>`; wk.style.display = "block" } else { wk.style.display = "none" }
}

function showTip(tip){
  const ft = document.getElementById("res-tip")
  if(tip){ ft.innerText = "💡 " + tip; ft.style.display = "block" }
}

// ─── VERIFY ───────────────────────────────────────────────────────────────────
function verificar(){
  const input = document.getElementById("resp").value.trim()
  if(!input) return
  let n = norm(input)
  if(!n) return

  // Resolve synonym to canonical form
  const canonical = resolveCanonical(n)

  if(usados.has(canonical)){
    setRes(t("alreadyUsed"), "#d97706", null, null)
    return
  }

  if(currentCat.id === "french" && currentCat.easter && currentCat.easter.has(n)){
    const fl = currentCat.easterFlavors && currentCat.easterFlavors[n]
    setRes(t("easterEgg"), "#f59e0b", fl, null)
    addTag(input, true); return
  }

  if(currentCat.id === "defunct"){
    const fact = currentCat.facts[canonical] || currentCat.facts[n]
    if(fact){ accept(input, canonical, fact, "https://en.wikipedia.org/wiki/" + toWikiTitle(canonical)) }
    else { setRes(t("notRecognized"), "#ef4444", null, null) }
    return
  }

  if(currentCat.id === "southern" && currentCat.notValid && currentCat.notValid.has(n)){
    const r = currentCat.notValidReasons && currentCat.notValidReasons[n]
    setRes(t("notSouthern") + " " + (r||""), "#ef4444", null, null)
    return
  }

  // Check canonical in list, then original
  const inList = (currentCat.list && (currentCat.list.has(canonical) || currentCat.list.has(n)))
  if(inList){
    const key = currentCat.list.has(canonical) ? canonical : n
    const tip = currentCat.tips && (currentCat.tips[n] || currentCat.tips[canonical])
    const flavor = currentCat.flavors && (currentCat.flavors[key] || currentCat.flavors[canonical])
    const wiki = ["capitals","oscars","landlocked"].includes(currentCat.id)
      ? "https://en.wikipedia.org/wiki/" + toWikiTitle(key) : null
    accept(input, canonical, flavor, wiki)
    if(tip) showTip(tip)
    return
  }

  setRes(t("notFound"), "#ef4444", null, null)
}

function resolveCanonical(n){
  return SYNONYMS[n] || n
}

function accept(input, canonical, flavor, wiki){
  const prev = puntos
  usados.add(canonical); puntos++
  document.getElementById("pts").innerText = puntos
  document.getElementById("resp").value = ""
  setRes(t("valid"), "#4ade80", flavor, wiki)
  updateProgress()
  addTag(input, false)
  document.getElementById("used-label").innerText = t("usedLabel") + " (" + puntos + "):"
  document.getElementById("usados-box").classList.remove("hidden")
  document.getElementById("resp").focus()
  saveProgress(currentCat.id, usados, currentCat.total)
  checkSavePoint(prev, puntos, currentCat.total)
  if(currentCat.total && puntos >= currentCat.total){
    setTimeout(() => showVictory(), 600)
  }
}

function showVictory(){
  document.getElementById("screen-game").classList.add("hidden")
  document.getElementById("win-title").innerText = t("winTitle", currentCat.name)
  document.getElementById("win-sub").innerText = t("winSub", currentCat.total)
  document.getElementById("win-another").innerText = t("winAnother")
  document.getElementById("win-share").innerText = t("winShare")
  document.getElementById("screen-win").classList.remove("hidden")
  clearProgress(currentCat.id)
}

function shareResult(){
  const text = t("shareText", currentCat.name, puntos, currentCat.total || "?")
  if(navigator.share){ navigator.share({text}) }
  else { navigator.clipboard.writeText(text).then(() => showToast("Copied!")) }
}

function addTag(nombre, isEaster){
  const tag = document.createElement("span")
  tag.className = "tag" + (isEaster ? " tag-easter" : "")
  tag.innerText = nombre
  document.getElementById("usados").appendChild(tag)
}

function toWikiTitle(n){
  return n.split(" ").map(w => w.charAt(0).toUpperCase() + w.slice(1)).join("_")
}

buildGrid()
</script>
